## ░▀▀▀░░▀░░▀░▀░▀░▀░▀▀▀░▀░▀░▀▀▀░▀░░
## CROSS-SHELL PROMPT
## The minimal, blazing-fast, and infinitely customizable prompt for any shell!

format = """
$hostname\
$directory\

$localip\
$shlvl\
$singularity\
$kubernetes\
$vcsh\
$hg_branch\
$docker_context\
$package\
$custom\

$sudo\

$fill\
$git_branch\
$git_status\
$git_commit\
$cmd_duration\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$shell\
$line_break\
$character"""


# Disable the blank line at the start of the prompt
add_newline = true


# Second param
[hostname]
ssh_only = true 
format = "[](fg:#0a0e27 bg:none)[█](fg:#e8e8f0 bg:#0a0e27)[$ssh_symbol$hostname](bold bg:#e8e8f0)[](fg:#e8e8f0 bg:none) "
disabled = false

# Third param
[directory]
format = "[](fg:#0a0e27 bg:none)[$path]($style)[█](fg:#2d3561 bg:#2d3561)[](fg:#a78bfa bg:#0a0e27)[ ](fg:#0a0e27 bg:#a78bfa)[](fg:#a78bfa bg:none)"
style = "fg:#e8e8f0 bg:#0a0e27 bold"
truncation_length = 3
truncate_to_repo=false
read_only = " "

## SECOND LINE/ROW: Prompt
# Prompt: param 2 └─
[character]
success_symbol = "[ ](#a78bfa bold)"
error_symbol = "[ ](#f472b6 bold)"

[line_break]
disabled = false

[fill]
symbol = ' '
style = 'bold'

[cmd_duration]
min_time = 1
format = "[](fg:#0a0e27 bg:none)[$duration]($style)[](fg:#0a0e27 bg:#0a0e27)[](fg:#d946ef bg:#0a0e27)[󱑂 ](fg:#0a0e27 bg:#d946ef)[](fg:#d946ef bg:none)"
disabled = false
style = "fg:#e8e8f0 bg:#0a0e27 bold"


[git_branch]
format = "[](fg:#0a0e27 bg:none)[$branch]($style)[](fg:#0a0e27 bg:#0a0e27)[](fg:#60a5fa bg:#0a0e27)[](fg:#0a0e27 bg:#60a5fa)[](fg:#60a5fa bg:none) "
style = "fg:#e8e8f0 bg:#0a0e27"
symbol = " "

[git_status]
format="[](fg:#0a0e27 bg:none)[$all_status$ahead_behind]($style)[](fg:#0a0e27 bg:#0a0e27)[](fg:#86efac bg:#0a0e27)[ ](fg:#0a0e27 bg:#86efac)[](fg:#86efac bg:none) "
style = "fg:#e8e8f0 bg:#0a0e27"
conflicted = "="
ahead =	"⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = " 󰄸 "
untracked = "?${count}"
stashed = ""
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = " ${count}"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "#d946ef"

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# # SYMBOLS

[aws]
symbol = "  "

[conda]
symbol = " "

[dart]
symbol = " "

# [directory]

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = " "

[elm]
symbol = " "

[golang]
symbol = " "

[hg_branch]
symbol = " "

[java]
symbol = " "

[julia]
symbol = " "

[haskell]
symbol = "λ "

[memory_usage]
symbol = " "

[nim]
symbol = " "

[nix_shell]
symbol = " "

[package]
symbol = " "

[perl]
symbol = " "

[php]
symbol = " "

[python]
symbol = " "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold #d946ef"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "

[shlvl]
symbol = " "

[swift]
symbol = "ﯣ "

[nodejs]
format = "via [ Node.js $version](bold #60a5fa) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

# Other languages configurations:
c.disabled = true
cmake.disabled = true
haskell.disabled = true
python.disabled = true
ruby.disabled = true
rust.disabled = true
perl.disabled = true
package.disabled = true
lua.disabled = true
nodejs.disabled = true
java.disabled = true
golang.disabled = true
