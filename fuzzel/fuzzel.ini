# Fuzzel Configuration - Purple Dark Theme

[main]
font=FiraCode Nerd Font:weight=bold:size=10
dpi-aware=no
terminal=alacritty -e
prompt="❯ "
icon-theme=Adwaita
width=35
horizontal-pad=20
vertical-pad=10
inner-pad=5
line-height=20
lines=8
letter-spacing=0
anchor=center
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=0a0e27e6
text=e8e8f0ff
match=a78bfaff
selection=a78bfaff
selection-text=0a0e27ff
selection-match=0a0e27ff
# border=a78bfaff

# [border]
# width=1
# radius=12

[dmenu]
mode=text  # text | index
exit-immediately-if-empty=no
